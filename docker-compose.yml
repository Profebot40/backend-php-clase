version: '3.8'

services:
  app:
    image: php:8.2-apache
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clase
    ports:
      - "3306:3306"